<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#000000"/>
  
  <!-- Calculator body -->
  <rect x="120" y="80" width="272" height="352" rx="24" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
  
  <!-- Display -->
  <rect x="148" y="108" width="216" height="80" rx="12" fill="#0a0a0a"/>
  <text x="352" y="175" font-family="monospace" font-size="48" fill="#ffffff" text-anchor="end">0</text>
  
  <!-- Buttons row 1 -->
  <rect x="148" y="212" width="48" height="44" rx="8" fill="#333"/>
  <rect x="208" y="212" width="48" height="44" rx="8" fill="#333"/>
  <rect x="268" y="212" width="48" height="44" rx="8" fill="#333"/>
  <rect x="328" y="212" width="48" height="44" rx="8" fill="#ff6b00"/>

  <!-- Buttons row 2 -->
  <rect x="148" y="268" width="48" height="44" rx="8" fill="#444"/>
  <rect x="208" y="268" width="48" height="44" rx="8" fill="#444"/>
  <rect x="268" y="268" width="48" height="44" rx="8" fill="#444"/>
  <rect x="328" y="268" width="48" height="44" rx="8" fill="#ff6b00"/>

  <!-- Buttons row 3 -->
  <rect x="148" y="324" width="48" height="44" rx="8" fill="#444"/>
  <rect x="208" y="324" width="48" height="44" rx="8" fill="#444"/>
  <rect x="268" y="324" width="48" height="44" rx="8" fill="#444"/>
  <rect x="328" y="324" width="48" height="44" rx="8" fill="#ff6b00"/>

  <!-- Buttons row 4 (bottom) -->
  <rect x="148" y="380" width="108" height="44" rx="8" fill="#444"/>
  <rect x="268" y="380" width="48" height="44" rx="8" fill="#444"/>
  <rect x="328" y="380" width="48" height="44" rx="8" fill="#ff6b00"/>
</svg>
